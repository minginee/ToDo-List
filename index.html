<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        
        <!-- Date Carousel -->
        <div class="date-carousel-wrapper">
            <div class="date-carousel" id="dateCarousel">
                <!-- Date buttons will be generated here -->
            </div>
        </div>

        <!-- Task today label -->
        <div class="task-date-label" id="taskDateLabel">Task today</div>
        
        <!-- Input section -->
        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..." 
                class="task-input"
            >
            <input 
                type="time" 
                id="timeInput" 
                class="time-input"
            >
            <button id="addBtn" class="add-btn">+</button>
        </div>

        <ul id="taskList" class="task-list">
            <!-- Tasks will be added here dynamically -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
